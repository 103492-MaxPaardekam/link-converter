<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QC Image Viewer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  </head>
  <body class="min-h-screen bg-cream text-ink antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute -top-24 -left-24 h-72 w-72 rounded-full bg-sand/70 blur-3xl"
      ></div>
      <div
        class="absolute top-1/3 -right-16 h-64 w-64 rounded-full bg-teal/20 blur-3xl"
      ></div>
      <div
        class="absolute bottom-0 left-1/4 h-56 w-56 rounded-full bg-rust/20 blur-3xl"
      ></div>
    </div>

    <main
      class="mx-auto flex w-full max-w-6xl flex-col px-4 py-10 sm:px-6 lg:py-14"
    >
      <header class="mb-8">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          <p
            class="inline-flex rounded-full border border-ink/15 bg-white/70 px-3 py-1 text-xs font-mono tracking-wide"
          >
            QC Viewer
          </p>
          <a
            href="index.html"
            class="inline-flex rounded-full border border-rust/30 bg-rust/10 px-3 py-1 text-xs font-semibold text-rust transition hover:bg-rust hover:text-white"
          >
            Back to Converter
          </a>
        </div>
        <h1 class="text-3xl font-extrabold leading-tight sm:text-4xl">
          Auto QC Images from
          <span class="text-teal">ACBuy</span>
          and
          <span class="text-rust">CNFans</span>
        </h1>
        <p class="mt-3 max-w-3xl text-sm text-ink/75 sm:text-base">
          Paste a CNFans or ACBuy product link. The gallery auto-loads possible
          QC images as you input.
        </p>
      </header>

      <section
        class="rounded-3xl border border-ink/10 bg-white/80 p-5 shadow-card backdrop-blur sm:p-7"
      >
        <label for="qcUrl" class="mb-2 block text-sm font-semibold"
          >Product link</label
        >
        <div class="flex flex-col gap-3 sm:flex-row">
          <input
            id="qcUrl"
            type="text"
            autocomplete="off"
            placeholder="https://www.acbuy.com/... or https://www.cnfans.com/..."
            class="w-full rounded-2xl border border-ink/20 bg-white px-4 py-3 font-mono text-sm outline-none ring-teal/50 transition focus:ring"
          />
          <button
            id="reloadButton"
            class="rounded-2xl bg-ink px-6 py-3 text-sm font-semibold text-cream transition hover:translate-y-[-1px] hover:bg-black disabled:cursor-not-allowed disabled:opacity-40"
            disabled
          >
            Reload
          </button>
        </div>
        <p class="mt-2 text-xs text-ink/65">
          Supported input: acbuy.com and cnfans.com product pages.
        </p>
        <p
          id="proxyBadge"
          class="mt-2 inline-flex hidden rounded-full border px-2 py-1 text-[10px] font-semibold"
        ></p>
        <p id="statusText" class="mt-2 hidden text-sm font-medium"></p>
      </section>

      <section
        class="mt-6 rounded-3xl border border-ink/10 bg-white/80 p-5 shadow-card backdrop-blur sm:p-7"
      >
        <div class="mb-4 flex items-center justify-between gap-2">
          <div class="flex items-center gap-2">
            <h2 class="text-base font-extrabold">QC Gallery</h2>
            <button
              id="downloadAllButton"
              class="rounded-lg border border-rust/25 bg-rust/10 px-2.5 py-1 text-[10px] font-semibold text-rust transition hover:bg-rust hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
              disabled
            >
              Download all ZIP
            </button>
            <button
              id="failedReportButton"
              class="rounded-lg border border-ink/25 bg-ink/5 px-2.5 py-1 text-[10px] font-semibold text-ink transition hover:bg-ink hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
              disabled
            >
              Failed URLs report
            </button>
          </div>
          <div class="flex items-center gap-2">
            <p
              id="sourceBadge"
              class="hidden rounded-full border px-2 py-1 text-[10px] font-semibold"
            ></p>
            <p id="countText" class="text-xs font-mono text-ink/65">0 images</p>
          </div>
        </div>
        <p id="emptyText" class="text-sm text-ink/65">
          No images yet. Paste a supported link to load QC images.
        </p>
        <div
          id="gallery"
          class="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4"
        ></div>
      </section>
    </main>

    <div
      id="lightbox"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90 p-4"
    >
      <button
        id="lightboxClose"
        class="absolute right-4 top-4 rounded-full border border-white/30 bg-white/10 px-3 py-1 text-sm font-semibold text-white transition hover:bg-white/20"
      >
        Close
      </button>
      <button
        id="lightboxPrev"
        class="absolute left-3 top-1/2 -translate-y-1/2 rounded-full border border-white/30 bg-white/10 px-3 py-2 text-xl font-bold text-white transition hover:bg-white/20"
      >
        ‹
      </button>
      <img
        id="lightboxImage"
        alt="QC preview"
        class="max-h-[90vh] max-w-[92vw] rounded-xl border border-white/20 object-contain"
      />
      <button
        id="lightboxNext"
        class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full border border-white/30 bg-white/10 px-3 py-2 text-xl font-bold text-white transition hover:bg-white/20"
      >
        ›
      </button>
      <p
        id="lightboxCounter"
        class="absolute bottom-4 left-1/2 -translate-x-1/2 rounded-full border border-white/30 bg-white/10 px-3 py-1 text-xs font-mono text-white"
      ></p>
    </div>

    <script>
      const qcUrlInput = document.getElementById("qcUrl");
      const reloadButton = document.getElementById("reloadButton");
      const statusText = document.getElementById("statusText");
      const proxyBadge = document.getElementById("proxyBadge");
      const countText = document.getElementById("countText");
      const sourceBadge = document.getElementById("sourceBadge");
      const emptyText = document.getElementById("emptyText");
      const gallery = document.getElementById("gallery");
      const downloadAllButton = document.getElementById("downloadAllButton");
      const failedReportButton = document.getElementById("failedReportButton");
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const lightboxClose = document.getElementById("lightboxClose");
      const lightboxPrev = document.getElementById("lightboxPrev");
      const lightboxNext = document.getElementById("lightboxNext");
      const lightboxCounter = document.getElementById("lightboxCounter");

      let debounceTimer = null;
      let lastLoadedUrl = "";
      let currentGalleryUrls = [];
      let lightboxIndex = 0;
      let lastZipFailedUrls = [];

      function setProxyBadge(state) {
        proxyBadge.classList.remove(
          "hidden",
          "border-teal/30",
          "bg-teal/10",
          "text-teal",
          "border-rust/30",
          "bg-rust/10",
          "text-rust",
          "border-ink/30",
          "bg-ink/5",
          "text-ink",
        );

        if (!state) {
          proxyBadge.classList.add("hidden");
          proxyBadge.textContent = "";
          return;
        }

        if (state === "online") {
          proxyBadge.classList.add("border-teal/30", "bg-teal/10", "text-teal");
          proxyBadge.textContent = "Proxy: Online";
          return;
        }

        if (state === "offline") {
          proxyBadge.classList.add("border-rust/30", "bg-rust/10", "text-rust");
          proxyBadge.textContent = "Proxy: Offline";
          return;
        }

        proxyBadge.classList.add("border-ink/30", "bg-ink/5", "text-ink");
        proxyBadge.textContent = "Proxy: Checking";
      }

      async function copyText(text, button, fallbackLabel) {
        if (!text) return;

        try {
          await navigator.clipboard.writeText(text);
          const previous = button.textContent;
          button.textContent = "Copied";
          setTimeout(() => {
            button.textContent = previous || fallbackLabel;
          }, 1000);
        } catch (_error) {
          setStatus(
            "Clipboard access failed. Copy manually from the opened tab.",
            "error",
          );
        }
      }

      async function checkProxyHealth() {
        setProxyBadge("checking");

        const endpoints = [
          "http://127.0.0.1:8787/api/health",
          "http://localhost:8787/api/health",
        ];

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint);
            if (!response.ok) continue;
            const data = await response.json();
            if (data?.ok) {
              setProxyBadge("online");
              return;
            }
          } catch (_error) {
            // Try next endpoint.
          }
        }

        setProxyBadge("offline");
      }

      function setSourceBadge(mode) {
        sourceBadge.classList.remove(
          "hidden",
          "border-teal/30",
          "bg-teal/10",
          "text-teal",
          "border-ink/30",
          "bg-ink/5",
          "text-ink",
          "border-rust/30",
          "bg-rust/10",
          "text-rust",
        );

        if (!mode) {
          sourceBadge.classList.add("hidden");
          sourceBadge.textContent = "";
          return;
        }

        if (mode === "api-fallback") {
          sourceBadge.classList.add(
            "border-rust/30",
            "bg-rust/10",
            "text-rust",
          );
          sourceBadge.textContent = "Source: ACBuy API fallback";
          return;
        }

        if (mode === "html-external") {
          sourceBadge.classList.add("border-ink/30", "bg-ink/5", "text-ink");
          sourceBadge.textContent = "Source: HTML via external proxy";
          return;
        }

        sourceBadge.classList.add("border-teal/30", "bg-teal/10", "text-teal");
        sourceBadge.textContent = "Source: HTML via local proxy";
      }

      function setStatus(message, tone) {
        if (!message) {
          statusText.className = "mt-2 hidden text-sm font-medium";
          statusText.textContent = "";
          return;
        }

        const toneClass =
          tone === "error"
            ? "text-rust"
            : tone === "ok"
              ? "text-teal"
              : "text-ink/75";
        statusText.className = `mt-2 text-sm font-medium ${toneClass}`;
        statusText.textContent = message;
      }

      function extractFirstUrl(text) {
        const matches = text.match(/https?:\/\/[^\s]+/i);
        return matches ? matches[0].trim() : "";
      }

      function getCleanInputValue() {
        const raw = qcUrlInput.value.trim();
        if (!raw) return "";
        return extractFirstUrl(raw) || raw;
      }

      function isSupportedQcSource(urlString) {
        try {
          const host = new URL(urlString).hostname.toLowerCase();
          return (
            host === "acbuy.com" ||
            host.endsWith(".acbuy.com") ||
            host === "cnfans.com" ||
            host.endsWith(".cnfans.com")
          );
        } catch (_error) {
          return false;
        }
      }

      function normalizeCandidateUrl(rawValue, baseUrl) {
        if (!rawValue) return "";
        const value = rawValue.trim();
        if (!value) return "";

        if (value.startsWith("data:")) return "";
        if (value.startsWith("//")) return `https:${value}`;

        try {
          return new URL(value, baseUrl).href;
        } catch (_error) {
          return "";
        }
      }

      function scoreQcCandidate(url) {
        const needle = url.toLowerCase();
        let score = 0;

        const strongSignals = [
          "qc",
          "quality",
          "inspection",
          "warehouse",
          "check",
          "jian",
          "zhipin",
        ];
        const mediumSignals = [
          "product",
          "detail",
          "album",
          "photo",
          "image",
          "img",
        ];

        strongSignals.forEach((token) => {
          if (needle.includes(token)) score += 5;
        });

        mediumSignals.forEach((token) => {
          if (needle.includes(token)) score += 2;
        });

        if (/\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(needle)) score += 3;
        return score;
      }

      function extractImageUrlsFromText(documentText, pageUrl) {
        const found = new Set();

        try {
          const parser = new DOMParser();
          const parsedDoc = parser.parseFromString(documentText, "text/html");
          const imageElements = parsedDoc.querySelectorAll("img");

          imageElements.forEach((img) => {
            const candidates = [
              img.getAttribute("src"),
              img.getAttribute("data-src"),
              img.getAttribute("data-original"),
              img.getAttribute("data-lazy"),
              img.getAttribute("data-lazy-src"),
            ];

            candidates.forEach((candidate) => {
              const normalized = normalizeCandidateUrl(candidate, pageUrl);
              if (normalized) found.add(normalized);
            });
          });
        } catch (_error) {
          // Fallback regex below handles raw or markdown text.
        }

        const urlRegex =
          /(https?:\/\/[^\s"'<>]+\.(?:jpg|jpeg|png|webp|gif)(?:\?[^\s"'<>]*)?)/gi;
        let match;
        while ((match = urlRegex.exec(documentText)) !== null) {
          const normalized = normalizeCandidateUrl(match[1], pageUrl);
          if (normalized) found.add(normalized);
        }

        return [...found];
      }

      function safeJsonParse(text) {
        try {
          return JSON.parse(text);
        } catch (_error) {
          return null;
        }
      }

      function normalizePossibleImage(url) {
        if (typeof url !== "string") return "";
        const trimmed = url.trim();
        if (!trimmed) return "";
        if (!/^https?:\/\//i.test(trimmed)) return "";
        return trimmed;
      }

      function canonicalizeImageUrl(rawUrl) {
        try {
          const url = new URL(rawUrl);
          const removable = [
            "x-oss-process",
            "x5secdata",
            "spm",
            "scm",
            "traceid",
            "from",
            "fromkv",
            "token",
          ];
          removable.forEach((key) => url.searchParams.delete(key));
          url.hash = "";
          return url.toString();
        } catch (_error) {
          return rawUrl;
        }
      }

      function dedupeImageUrls(urls) {
        const seen = new Set();
        const output = [];

        urls.forEach((url) => {
          const canonical = canonicalizeImageUrl(url);
          if (seen.has(canonical)) return;
          seen.add(canonical);
          output.push(url);
        });

        return output;
      }

      function showLightbox(index) {
        if (!currentGalleryUrls.length) return;
        lightboxIndex = Math.max(
          0,
          Math.min(index, currentGalleryUrls.length - 1),
        );
        lightboxImage.src = currentGalleryUrls[lightboxIndex];
        lightboxCounter.textContent = `${lightboxIndex + 1} / ${currentGalleryUrls.length}`;
        lightbox.classList.remove("hidden");
        lightbox.classList.add("flex");
      }

      function hideLightbox() {
        lightbox.classList.add("hidden");
        lightbox.classList.remove("flex");
      }

      function stepLightbox(delta) {
        if (!currentGalleryUrls.length) return;
        let nextIndex = lightboxIndex + delta;
        if (nextIndex < 0) nextIndex = currentGalleryUrls.length - 1;
        if (nextIndex >= currentGalleryUrls.length) nextIndex = 0;
        showLightbox(nextIndex);
      }

      function triggerDownload(url, filename) {
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.rel = "noopener noreferrer";
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      function inferImageExtension(url) {
        try {
          const path = new URL(url).pathname;
          const match = path.match(/\.([a-zA-Z0-9]+)$/);
          if (match) return match[1].toLowerCase();
        } catch (_error) {
          return "jpg";
        }

        return "jpg";
      }

      async function downloadAllAsZip() {
        if (!currentGalleryUrls.length) return;

        if (!window.JSZip) {
          setStatus(
            "ZIP library not available. Refresh and try again.",
            "error",
          );
          return;
        }

        downloadAllButton.disabled = true;
        const originalLabel = downloadAllButton.textContent;

        try {
          const zip = new JSZip();
          let successCount = 0;
          const failedUrls = [];

          for (let index = 0; index < currentGalleryUrls.length; index += 1) {
            const url = currentGalleryUrls[index];
            downloadAllButton.textContent = `Zipping ${index + 1}/${currentGalleryUrls.length}`;

            try {
              const response = await fetch(url);
              if (!response.ok) {
                failedUrls.push(`${url} -> HTTP ${response.status}`);
                continue;
              }

              const blob = await response.blob();
              const extension = inferImageExtension(url);
              zip.file(
                `qc-${String(index + 1).padStart(3, "0")}.${extension}`,
                blob,
              );
              successCount += 1;
            } catch (error) {
              // Skip individual failures and continue with remaining images.
              failedUrls.push(`${url} -> ${String(error)}`);
            }
          }

          lastZipFailedUrls = failedUrls;
          failedReportButton.disabled = lastZipFailedUrls.length === 0;

          if (successCount === 0) {
            setStatus(
              "Could not fetch images for ZIP. Try per-image download.",
              "error",
            );
            return;
          }

          downloadAllButton.textContent = "Generating ZIP...";
          const zipBlob = await zip.generateAsync({ type: "blob" });
          const zipUrl = URL.createObjectURL(zipBlob);
          triggerDownload(zipUrl, "qc-images.zip");
          setTimeout(() => URL.revokeObjectURL(zipUrl), 3000);

          if (successCount < currentGalleryUrls.length) {
            setStatus(
              `Downloaded ZIP with ${successCount}/${currentGalleryUrls.length} images (some skipped).`,
              "ok",
            );
          } else {
            setStatus(`Downloaded ZIP with ${successCount} images.`, "ok");
          }
        } catch (_error) {
          setStatus("Failed to build ZIP archive.", "error");
        } finally {
          downloadAllButton.textContent = originalLabel;
          downloadAllButton.disabled = currentGalleryUrls.length === 0;
        }
      }

      function downloadFailedUrlsReport() {
        if (!lastZipFailedUrls.length) return;

        const lines = [
          `QC ZIP Failure Report`,
          `Generated: ${new Date().toISOString()}`,
          `Failed count: ${lastZipFailedUrls.length}`,
          "",
          ...lastZipFailedUrls,
        ];

        const blob = new Blob([lines.join("\n")], {
          type: "text/plain;charset=utf-8",
        });
        const reportUrl = URL.createObjectURL(blob);
        triggerDownload(reportUrl, "qc-failed-urls-report.txt");
        setTimeout(() => URL.revokeObjectURL(reportUrl), 3000);
      }

      function parseAcbuyContext(acbuyUrlString) {
        try {
          const parsed = new URL(acbuyUrlString);
          const id = parsed.searchParams.get("id") || "";
          const source = parsed.searchParams.get("source") || "AL";
          const encodedUrl = parsed.searchParams.get("url") || "";

          let decodedUrl = "";
          if (encodedUrl) {
            const once = decodeURIComponent(encodedUrl);
            decodedUrl = once.includes("%") ? decodeURIComponent(once) : once;
          }

          return {
            id,
            source,
            encodedUrl,
            decodedUrl,
          };
        } catch (_error) {
          return {
            id: "",
            source: "AL",
            encodedUrl: "",
            decodedUrl: "",
          };
        }
      }

      async function fetchPageText(targetUrl) {
        const stripped = targetUrl.replace(/^https?:\/\//i, "");
        const encodedTarget = encodeURIComponent(targetUrl);

        const endpoints = [
          {
            url: `http://127.0.0.1:8787/api/fetch?url=${encodedTarget}`,
            mode: "html-local",
          },
          {
            url: `http://localhost:8787/api/fetch?url=${encodedTarget}`,
            mode: "html-local",
          },
          {
            url: `https://api.codetabs.com/v1/proxy/?quest=${encodedTarget}`,
            mode: "html-external",
          },
          {
            url: `https://r.jina.ai/http://${stripped}`,
            mode: "html-external",
          },
          {
            url: `https://r.jina.ai/http://www.${stripped}`,
            mode: "html-external",
          },
        ];

        const errors = [];
        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint.url);
            if (!response.ok) {
              errors.push(`${endpoint.url} -> ${response.status}`);
              continue;
            }

            const text = await response.text();
            if (text && text.trim().length > 0) {
              return { text, mode: endpoint.mode };
            }
          } catch (error) {
            errors.push(`${endpoint.url} -> ${String(error)}`);
          }
        }

        throw new Error(errors.join(" | "));
      }

      async function fetchTextFromLocalProxy(targetUrl) {
        const encodedTarget = encodeURIComponent(targetUrl);
        const endpoints = [
          `http://127.0.0.1:8787/api/fetch?url=${encodedTarget}`,
          `http://localhost:8787/api/fetch?url=${encodedTarget}`,
        ];

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint);
            if (!response.ok) continue;
            const text = await response.text();
            if (text) return text;
          } catch (_error) {
            // Try next endpoint.
          }
        }

        return "";
      }

      async function getAcbuyFallbackImages(productUrl) {
        const context = parseAcbuyContext(productUrl);
        const found = new Set();

        if (context.id) {
          const qcApiUrl = `https://www.acbuy.com/prefix-api/store-order/api/getOrderProductQcImages?id=${encodeURIComponent(context.id)}`;
          const qcText = await fetchTextFromLocalProxy(qcApiUrl);
          const qcJson = safeJsonParse(qcText);
          const qcList = qcJson?.data?.imageList;

          if (Array.isArray(qcList)) {
            qcList.forEach((item) => {
              const candidate =
                typeof item === "string"
                  ? item
                  : item?.url || item?.image || item?.img || item?.src || "";
              const normalized = normalizePossibleImage(candidate);
              if (normalized) found.add(normalized);
            });
          }
        }

        const searchParams = new URLSearchParams();
        if (context.id) searchParams.set("id", context.id);
        if (context.source) searchParams.set("source", context.source);
        if (context.decodedUrl) searchParams.set("url", context.decodedUrl);

        if ([...searchParams.keys()].length > 0) {
          const searchApiUrl = `https://www.acbuy.com/prefix-api/store-product/product/api/item/search?${searchParams.toString()}`;
          const searchText = await fetchTextFromLocalProxy(searchApiUrl);
          const searchJson = safeJsonParse(searchText);
          const items = searchJson?.data?.items;

          if (Array.isArray(items)) {
            items.forEach((item) => {
              const candidates = [
                item?.pic_path,
                item?.picUrl,
                item?.image,
                item?.img,
                item?.photo,
              ];

              candidates.forEach((candidate) => {
                const normalized = normalizePossibleImage(candidate);
                if (normalized) found.add(normalized);
              });
            });
          }
        }

        return [...found];
      }

      function renderGallery(imageUrls) {
        gallery.innerHTML = "";
        currentGalleryUrls = [...imageUrls];
        lastZipFailedUrls = [];
        failedReportButton.disabled = true;
        downloadAllButton.disabled = currentGalleryUrls.length === 0;
        countText.textContent = `${imageUrls.length} image${imageUrls.length === 1 ? "" : "s"}`;
        emptyText.classList.toggle("hidden", imageUrls.length > 0);

        imageUrls.forEach((url, index) => {
          const card = document.createElement("article");
          card.className =
            "overflow-hidden rounded-2xl border border-ink/10 bg-white";

          const link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.addEventListener("click", (event) => {
            event.preventDefault();
            showLightbox(index);
          });

          const img = document.createElement("img");
          img.src = url;
          img.loading = "lazy";
          img.alt = `QC image ${index + 1}`;
          img.className = "aspect-square h-full w-full object-cover";

          const label = document.createElement("p");
          label.className =
            "truncate border-t border-ink/10 px-2 py-1 font-mono text-[10px] text-ink/65";
          label.textContent = `#${index + 1}`;

          const actions = document.createElement("div");
          actions.className =
            "flex items-center gap-1 border-t border-ink/10 p-1";

          const copyUrlButton = document.createElement("button");
          copyUrlButton.className =
            "rounded-md border border-teal/25 bg-white px-2 py-1 text-[10px] font-semibold text-teal transition hover:bg-teal/10";
          copyUrlButton.textContent = "Copy URL";
          copyUrlButton.addEventListener("click", () =>
            copyText(url, copyUrlButton, "Copy URL"),
          );

          const downloadButton = document.createElement("button");
          downloadButton.className =
            "rounded-md border border-rust/25 bg-white px-2 py-1 text-[10px] font-semibold text-rust transition hover:bg-rust/10";
          downloadButton.textContent = "Download";
          downloadButton.addEventListener("click", () =>
            triggerDownload(url, `qc-${index + 1}.jpg`),
          );

          link.appendChild(img);
          card.appendChild(link);
          card.appendChild(label);
          actions.appendChild(copyUrlButton);
          actions.appendChild(downloadButton);
          card.appendChild(actions);
          gallery.appendChild(card);
        });
      }

      async function loadQcImages(urlString, force) {
        if (!isSupportedQcSource(urlString)) {
          setStatus(
            "Please input a valid acbuy.com or cnfans.com link.",
            "error",
          );
          setSourceBadge("");
          renderGallery([]);
          return;
        }

        if (!force && urlString === lastLoadedUrl) {
          return;
        }

        lastLoadedUrl = urlString;
        reloadButton.disabled = true;
        setStatus("Loading page and extracting images...", "info");
        setSourceBadge("");

        try {
          const fetchResult = await fetchPageText(urlString);
          let extracted = extractImageUrlsFromText(fetchResult.text, urlString);
          let sourceMode = extracted.length > 0 ? fetchResult.mode : "";

          if (extracted.length === 0) {
            const host = new URL(urlString).hostname.toLowerCase();
            const isAcbuy = host === "acbuy.com" || host.endsWith(".acbuy.com");
            if (isAcbuy) {
              const apiFallbackImages = await getAcbuyFallbackImages(urlString);
              if (apiFallbackImages.length > 0) {
                extracted = apiFallbackImages;
                sourceMode = "api-fallback";
              }
            }
          }

          if (extracted.length === 0) {
            renderGallery([]);
            setSourceBadge("");
            setStatus("No images found from this page response.", "error");
            return;
          }

          const scored = extracted
            .map((url) => ({ url, score: scoreQcCandidate(url) }))
            .sort((a, b) => b.score - a.score);

          const prioritized = scored
            .filter((item) => item.score >= 5)
            .map((item) => item.url);
          const fallback = scored.map((item) => item.url);
          const output = dedupeImageUrls(
            prioritized.length > 0 ? prioritized : fallback,
          );

          renderGallery(output.slice(0, 120));
          setSourceBadge(sourceMode || "html-local");
          setStatus(`Loaded ${output.length} possible QC image(s).`, "ok");
        } catch (error) {
          renderGallery([]);
          setSourceBadge("");
          setStatus(
            "Could not fetch page content automatically. Start local proxy with 'npm run dev' (port 8787), then try Reload.",
            "error",
          );
          console.error(error);
        } finally {
          reloadButton.disabled = !isSupportedQcSource(getCleanInputValue());
        }
      }

      function refreshReloadState() {
        const value = getCleanInputValue();
        reloadButton.disabled = !isSupportedQcSource(value);
      }

      qcUrlInput.addEventListener("input", () => {
        refreshReloadState();

        const value = getCleanInputValue();
        clearTimeout(debounceTimer);

        if (!isSupportedQcSource(value)) {
          setStatus(
            value ? "Waiting for a valid acbuy.com or cnfans.com link." : "",
            value ? "error" : "info",
          );
          setSourceBadge("");
          renderGallery([]);
          return;
        }

        setStatus("Link detected. Auto-loading QC images...", "info");
        debounceTimer = setTimeout(() => {
          loadQcImages(value, false);
        }, 450);
      });

      qcUrlInput.addEventListener("paste", () => {
        requestAnimationFrame(() => {
          const value = getCleanInputValue();
          refreshReloadState();
          if (isSupportedQcSource(value)) {
            loadQcImages(value, true);
          }
        });
      });

      reloadButton.addEventListener("click", () => {
        const value = getCleanInputValue();
        loadQcImages(value, true);
      });

      downloadAllButton.addEventListener("click", downloadAllAsZip);
      failedReportButton.addEventListener("click", downloadFailedUrlsReport);

      lightboxClose.addEventListener("click", hideLightbox);
      lightboxPrev.addEventListener("click", () => stepLightbox(-1));
      lightboxNext.addEventListener("click", () => stepLightbox(1));
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          hideLightbox();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (lightbox.classList.contains("hidden")) return;

        if (event.key === "Escape") {
          hideLightbox();
          return;
        }

        if (event.key === "ArrowRight") {
          stepLightbox(1);
          return;
        }

        if (event.key === "ArrowLeft") {
          stepLightbox(-1);
        }
      });

      checkProxyHealth();
      setInterval(checkProxyHealth, 20000);
      refreshReloadState();
    </script>
  </body>
</html>
